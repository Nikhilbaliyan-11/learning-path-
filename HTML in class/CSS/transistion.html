<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .child{
            position: relative;
            left: 300px;
            top:300px;
            height: 100px;
            width: 300px;
            background-color: aqua;
            border: 2px solid black;
            color: rgb(22, 22, 22);
            text-align: center;
            cursor: pointer;
            transition: all 0.3 ease;
            transform: translateZ(20px);
            transition-property:height,color,background-color,;
            transition-duration: 20ms;

            }
            .child:hover{
               height:150px;
              width: 350px;
               color: blue;
               transform: scale(1.9);
               background-color:aquamarine;
               
            }
           
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transition property</title>
</head>
<body>
   
<div style="align-content: center;" class="parent">
    <div class="child">
    <h1 style="text-align:center;">
        TRANSISTION PROPERTY
    </h1>

    </div>
</div>


</body>
</html>
