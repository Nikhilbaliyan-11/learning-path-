<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .card{
            border: 2px solid black;
            background-color: #e80d0d;
            transform: rotate(20deg) ;
            height: 100px;
            width:1000px;
            margin: 0 auto;
            text-align: center;
            position: relative;
            top:150px;
        }
        .card1{
            border: 2px solid black;
            background-color: #98e50a;
           transform: translateX(20px) translateY(20px)  ;
           height: 100px;
           width:1000px;
           margin: 0 auto;
           text-align: center;
           position: relative;
           bottom:30px;
          
          
        }
        .card2{
            border: 2px solid black;
            background-color: #0eeab6;
            transform: scale(20px); height: 100px;
            width:1000px;
            margin: 0 auto;
            text-align: center;
            
        }
        .card3{
            border: 2px solid black;
            background-color: #0e0eca;
           transform: skew(10px);
           height: 100px;
           width:1000px;
           margin: 0 auto;
           text-align: center;
           
        }
        .card4{
            border: 2px solid black;
            background-color: #0de823;
            transform:translate3d(100px);
            height: 100px;
            width:1000px;
            margin: 0 auto;
            text-align: center;
           
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transform</title>
</head>
<body style="border-color: green;">
      
    <h1 style="text-align: center;">transform property</h1>

    <div class="card1">
       
        <h2>
          tanslate
        </h2>
    </div>
    
    <div class="card2">
      
        <h2>
          scale
        </h2>
    </div>
  
    <div class="card3">
      
        <h2>
          skew
        </h2>
    </div>

    <div class="card">
        
        <h2>
            rotate
        </h2>
    </div>

    <div class="card4">
    
        <h2>
          transform>translate3d
        </h2>
    </div>
    
</body>
</html>
