<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display:grid;
          grid-template-columns: 1fr 1fr 1fr;
          grid-template-rows: 1fr auto 1fr auto 1fr;
          border: 1px solid black;
          gap: 10px;
          height: 100%;
          
        }
       
        .header{
            
            text-align: center;
            grid-column: 1/4;
            grid-row: 1/2;
            border: 3px solid rgb(189, 11, 11);
            border-radius: 5px;
            background-color: rgb(189, 11, 11);

        }
        .left-side{
            text-align: center;
            grid-column: 1/2;
            grid-row: 2/5;
            border: 3px solid rgb(156, 189, 11);
            border-radius: 5px;
           background-color: rgb(156, 189, 11);
        }
        .banner{
            text-align: center;
            grid-column: 2/3;
            grid-row: 2/3;
            border: 3px solid rgb(11, 183, 189);
            border-radius: 5px;
            background-color: rgb(11, 183, 189);
        }
        .right-side{
            text-align: center;
            grid-row: 2/5;
            grid-column: 3/4;
            border: 3px solid rgb(189, 11, 189);
            border-radius: 5px;
            background-color: rgb(189, 11, 189);
        }
        .main{
            text-align: center;
            grid-row: 3/5;
            grid-column: 2/3;
            border: 3px solid rgb(133, 11, 189);
            border-radius: 5px;
            background-color: rgb(133, 11, 189);

        }
        .footer{
            text-align: center;
            grid-row: 5/6;
            grid-column: 1/4;
            border: 3px solid rgb(3, 104, 255);
            border-radius: 5px;
            background-color: rgb(3, 104, 255);

        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">Header </div>
        <div class="left-side">Left-side</div>
        <div class="right-side">Right-side</div>
        <div class="main">Main</div>
        <div class="banner">Banner</div>
        <div class="footer">Footer</div>
    </div>

   
</body>
</html>
