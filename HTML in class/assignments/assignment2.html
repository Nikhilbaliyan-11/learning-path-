<head>

<body style="font-family: Arial, sans-serif; margin: 0; padding: 0; background-color:black;">


    <div style="display: flex; align-items: center; justify-content: space-between; background-color: rgb(11, 235, 239); padding: 10px; height: 80px;">

                    <span  style="text-decoration: none; color: #2980b9; font-size: 18px; font-weight: bold;">ECE</span>

        <div style="width: 80%; padding: 40px; background-color: #f9f9f9;">
           <center> <h2 style="font-size: 24px; margin-bottom: 20px;">Login Page</h2></center>
            <form action="login_submit.html" method="POST" style="margin-top: 20px;">
<center>                
    <label for="username" style="font-size: 18px; margin-bottom: 10px;text-align:left ">User Name:</label>

    <input type="text" id="username" name="username" style="width: 300px; padding: 10px; margin-bottom: 15px; border: 2px solid black; background-color :rgb(46, 255, 255)"><br><br>

    <div style="margin-top: 20px;">
        <input type="submit" value="Submit" style="padding: 10px 20px; font-size: 16px; font-weight: bold; cursor: pointer; border: 2px solid black; background-color: rgb(0, 179, 255); color: white; margin-right: 10px;">
        <input type="reset" value="Reset" style="padding: 10px 20px; font-size: 16px; font-weight: bold; cursor: pointer; border: 2px solid black; background-color: white; color:black"></center>
                </div>
