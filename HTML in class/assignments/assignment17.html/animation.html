<!DOCTYPE html>
<html lang="en">
<head>
    <style>
    #child{

        width: 200px;
        height: 50px;
        background-color: red;
        animation-name :example ;
        text-align: center;
        animation:example 4s infinite;
        cursor: pointer;
       position:relative;
    }
    @keyframes example {
        0%{
            background-color: red;
            left: 0px; top:0px;
        }
        25%{
            background-color:yellow;
            left: 400px; top:0px;
        }
        50%{
            background-color: rgb(13, 196, 237);
            left: 400px; top:400px;
        }
        75%{
            background-color: rgb(13, 237, 140);
            left: 0px; top:400px;
        }
        100%{
            background-color:blue;
            left: 0px; top:0px;
        }
    }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
</head>
<body>
    <div id="child">

        <h1>Animation</h1>
    </div>
</body>
</html>
