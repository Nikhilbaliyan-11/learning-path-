<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background-color: #f8f8f8;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        form {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }
        button {
            background: #af704c;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #0998f1ca;
        }
    </style>
</head>
<body>
    <h1>Contact Form</h1>
    <form id="contactForm">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Your Email" required>
        
        <label for="phone">Phone Number:</label>
        <input type="text" id="phone" name="phone" placeholder="Your Phone Number" required>
        
        <button type="submit">Send</button>
    </form>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();  // Prevent default form submission
            
            let email = document.getElementById('email').value;
            let phone = document.getElementById('phone').value;
            let emailPattern = /^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[a-z]{2,}$/;  // Standard email pattern
            let phonePattern = /^\d{10}$/;  // Phone number must be exactly 10 digits
            
            let errors = [];
            
            if (!emailPattern.test(email)) {
                errors.push("Invalid email address. It should be in the format name@domain.co.");
            }
            
            if (!phonePattern.test(phone)) {
                errors.push("Phone number must contain exactly 10 digits.");
            }
            
            if (errors.length > 0) {
                alert(errors.join("\n"));
            } else {
                alert("Form submitted successfully!");
            }
        });
    </script>
</body>
</html>
