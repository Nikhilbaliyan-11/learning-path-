<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Welcome to My Page</h1>
    <p>Here is today's date:</p>
    <script>
        const currentDate = new Date();
        const day = currentDate.getDate();
        const month = currentDate.getMonth() + 1; // Months are zero-based
        const year = currentDate.getFullYear();

        var x = new Date();
        document.write(x);
        var y = new Date();
        document.write(y.toDateString() + "<br>");
        document.write(y.getFullYear() + "<br>");
        document.write(y.getMonth() + "<br>");
        document.write(y.getMonth() + "<br>");
        document.write(y.getDate() + "<br>");
        document.write(y.getHours() + "<br>");
        document.write(y.getDay() + "<br>");


        document.write(`<strong>${day}/${month}/${year}</strong>`);


    </script>
</body>
</html>
