<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div style="text-align: center; margin-top: 50px;">

    </div>
        <h1>Calculator</h1>
        <input type="number" id="num1" placeholder="First number">
        <input type="number" id="num2" placeholder="Second number">
        <button id="add">+</button>
        <button id="subtract">-</button>
        <button id="multiply">*</button>
        <button id="divide">/</button>
        <h2>Result: <span id="result">0</span></h2>
    </div>
    <script>
        const num1 = document.getElementById('num1');
        const num2 = document.getElementById('num2');
        const result = document.getElementById('result');

        document.getElementById('add').addEventListener('click', () => calc('+'));
        document.getElementById('subtract').addEventListener('click', () => calc('-'));
        document.getElementById('multiply').addEventListener('click', () => calc('*'));
        document.getElementById('divide').addEventListener('click', () => calc('/'));

        function calc(op) {
            const n1 = parseFloat(num1.value), n2 = parseFloat(num2.value);
            if (isNaN(n1) || isNaN(n2)) {
                alert('Enter valid numbers');
                return;
            }
            result.textContent = op === '/' && n2 === 0 ? 'Error' : eval(`${n1} ${op} ${n2}`);
        }
    </script>

   
</body>
</html>
