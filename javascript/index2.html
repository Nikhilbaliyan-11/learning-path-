    <script>
        // Example of conditional operator
        let student = {
            firstname: 'Ram',
            lastname: 'Kumar',
            age: 19,
            percentage: function() {
            return 95; // Assuming a valid percentage value
            },
            toString: function() {
            return `Name: ${this.firstname} ${this.lastname}, Age: ${this.age}, Percentage: ${this.percentage()}%`;
            }
        };
        console.log(student.toString());
