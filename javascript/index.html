<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Counter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="row min-vh-100 align-items-center justify-content-center">
            <div class="col-md-8 text-center">
                <h1 class="display-4 mb-4">Visitor Counter</h1>
                <div class="counter-container mb-4">
                    <span id="visitorCount" class="counter">0</span>
                </div>
                <p class="lead">
                    Welcome to our visitor counter! This page tracks unique visitors using a combination of IP address and browser information.
                    Each time you visit from a different browser or in private mode, you'll be counted as a new visitor.
                </p>
                <div id="errorMessage" class="alert alert-danger d-none" role="alert"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
